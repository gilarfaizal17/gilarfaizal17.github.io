<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* POPUP ALERT */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 250px;
        }

        .popup-box button {
            margin-top: 15px;
            background: #4CAF50;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="login()">LOGIN</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <p id="pesan"></p>
        <button onclick="tutupPopup()">OK</button>
    </div>
</div>

<script>
    function login() {
        let userBenar = "gilar";
        let passBenar = "20363";

        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        if (username === userBenar && password === passBenar) {
            tampilkanPopup("Login Berhasil");
        } else {
            tampilkanPopup("Login Gagal");
        }
    }

    function tampilkanPopup(teks) {
        document.getElementById("pesan").innerText = teks;
        document.getElementById("popup").style.display = "flex";
    }

    function tutupPopup() {
        document.getElementById("popup").style.display = "none";
    }
</script>

</body>
</html>
